<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traductor PseudoPy</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="contenedor">
        <section class="cabecera">
            <p class="etiqueta">PseudoPy</p>
            <h1>Analizador y traductor a Python</h1>
            <p class="subtitulo">Escribe pseudocódigo estructurado en español, valida su sintaxis y obten la traducción lista para ejecutar.</p>
        </section>

        <section class="panel reglas-panel">
            <details class="guia-desplegable">
                <summary class="reglas-encabezado">
                    <div>
                        <p class="etiqueta">Guia rapida</p>
                        <h2>Reglas del lenguaje</h2>
                    </div>
                    <span class="reglas-flecha" aria-hidden="true">▼</span>
                </summary>
                <div id="reglasLista" class="reglas-grid"></div>
            </details>
        </section>

        <section class="panel principal">
            <div class="bloque">
                <label for="codigo">Pseudocódigo</label>
                <textarea id="codigo" placeholder="INICIO&#10;&emsp;LEER x&#10;&emsp;SI x > 5 ENTONCES&#10;&emsp;&emsp;ESCRIBIR &quot; Resultado:&quot;, x&#10;&emsp;SINO&#10;&emsp;&emsp;ESCRIBIR &quot;Hola&quot;&#10;&emsp;FIN&#10;FIN"></textarea>
            </div>
            <button id="analizarBtn" type="button">Analizar y traducir</button>
        </section>

        <section class="resultados">
            <article class="panel">
                <h2>Errores</h2>
                <div id="errores" class="errores vacio">Sin análisis todavía.</div>
            </article>

            <article class="panel">
                <h2>Tokens</h2>
                <pre id="tokens" class="salida">[]</pre>
            </article>

            <article class="panel" hidden>
                <div class="panel-encabezado">
                    <h2>Python generado</h2>
                    <button id="copiarTraduccionBtn" type="button" class="boton-secundario" aria-label="Copiar traduccion generada">Copiar</button>
                </div>
                <textarea id="traduccion" readonly placeholder="La traduccion a Python aparecera aqui."></textarea>
            </article>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
